<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Marquee Overlay</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; background: transparent !important; }
    body { display: flex; flex-direction: column; font-family: system-ui, sans-serif; }
    .marquee-inner { width: max-content; }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  </style>
</head>
<body>
  <div id="marquee-container" style="width:100%;flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;">
    <!-- Content updated via updateMarquee(html) over WebSocket -->
  </div>

  <script>
// Template for OBS browser source. Set WS_URL to your relay. App sends { type: "marquee", html: "..." }.
function updateMarquee(html) {
  var el = document.getElementById("marquee-container");
  if (el && typeof html === "string") el.innerHTML = html;
}
(function(){
  var WS_URL = "ws://YOUR_RELAY_HOST:4455";
  function connect() {
    try {
      var ws = new WebSocket(WS_URL);
      ws.onmessage = function(e) {
        try {
          var msg = JSON.parse(e.data);
          if (msg.type === "marquee" && typeof msg.html === "string") updateMarquee(msg.html);
        } catch (err) {}
      };
      ws.onclose = function() { setTimeout(connect, 2000); };
    } catch (err) { setTimeout(connect, 2000); }
  }
  connect();
})();
  </script>
</body>
</html>
