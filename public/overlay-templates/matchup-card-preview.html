<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Matchup Card – CSS Preview</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 1920px;
      height: 1080px;
      background: rgba(0, 0, 0, 0.01);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <!-- Same structure and inline styles as the app’s matchup card preview (MatchupCard.tsx / overlay API). -->
  <div id="matchup-container" style="width:100%;max-width:672px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 16px;flex-shrink:0;box-sizing:border-box;">
    <!-- Top: event name -->
    <div style="width:92%;max-width:420px;display:flex;align-items:center;justify-content:center;min-height:44px;clip-path:polygon(8% 0,92% 0,100% 100%,0 100%);color:#fff;font-family:system-ui,sans-serif;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1),0 2px 4px -2px rgba(0,0,0,0.1);background:linear-gradient(to right,rgba(0,0,0,0.5),#b45309,rgba(0,0,0,0.5));font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.95);font-size:18px;">53rd Annual Yogi Open</div>
    <!-- Middle: player names + VS -->
    <div style="display:flex;justify-content:center;width:100%;">
      <div style="display:flex;align-items:stretch;justify-content:space-between;gap:0;min-height:56px;width:fit-content;border-radius:9999px;padding:8px 12px;border:1px solid rgba(148,163,184,0.7);color:#fff;font-family:system-ui,sans-serif;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1),0 2px 4px -2px rgba(0,0,0,0.1);background:linear-gradient(to bottom,rgba(19,78,74,0.95),rgba(17,94,89,0.9),rgba(30,41,59,0.95));">
        <div style="display:flex;align-items:stretch;gap:8px;flex:1 1 0;min-width:180px;justify-content:flex-start;border-radius:9999px 0 0 9999px;background:linear-gradient(to bottom,#450a0a,rgba(127,29,29,0.95),#000);margin:-8px -12px -8px -8px;padding:8px 12px;position:relative;z-index:0;">
          <div style="flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0 2px;"><span style="font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;color:#fff;">3</span></div>
          <div style="width:1px;align-self:stretch;min-height:20px;background:rgba(255,255,255,0.5);flex-shrink:0;"></div>
          <div style="flex:1 1 0;min-width:120px;display:flex;align-items:center;justify-content:center;position:relative;">
            <span style="font-weight:600;text-transform:uppercase;color:rgba(255,255,255,0.95);text-align:center;font-size:18px;white-space:nowrap;padding:0 25px;">Player One</span>
          </div>
        </div>
        <div style="flex-shrink:0;position:relative;z-index:2;display:flex;align-items:center;justify-content:center;margin-top:-8px;margin-bottom:-8px;width:72px;height:72px;box-sizing:border-box;"><span style="font-size:24px;font-weight:700;color:#000;letter-spacing:0.05em;background:#fff;border:2px solid rgba(148,163,184,0.7);padding:0 8px;display:flex;align-items:center;justify-content:center;width:100%;height:100%;box-sizing:border-box;">VS</span></div>
        <div style="display:flex;align-items:stretch;gap:8px;flex:1 1 0;min-width:180px;justify-content:flex-end;border-radius:0 9999px 9999px 0;background:linear-gradient(to bottom,#172554,rgba(30,58,138,0.95),#000);margin:-8px -8px -8px -12px;padding:8px 12px;position:relative;z-index:0;">
          <div style="flex:1 1 0;min-width:120px;display:flex;align-items:center;justify-content:center;position:relative;">
            <span style="font-weight:600;text-transform:uppercase;color:rgba(255,255,255,0.95);text-align:center;font-size:18px;white-space:nowrap;padding:0 25px;">Player Two</span>
          </div>
          <div style="width:1px;align-self:stretch;min-height:20px;background:rgba(255,255,255,0.5);flex-shrink:0;"></div>
          <div style="flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0 2px;"><span style="font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;color:#fff;">2</span></div>
        </div>
      </div>
    </div>
    <!-- Bottom: round label -->
    <div style="width:92%;max-width:420px;display:flex;align-items:center;justify-content:center;min-height:44px;clip-path:polygon(0 0,100% 0,92% 100%,8% 100%);color:#fff;font-family:system-ui,sans-serif;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1),0 2px 4px -2px rgba(0,0,0,0.1);background:linear-gradient(to right,rgba(0,0,0,0.5),#b45309,rgba(0,0,0,0.5));font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.95);font-size:14px;">Finals</div>
  </div>
</body>
</html>
